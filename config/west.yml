manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware/zmk
    - name: kloir-z
      url-base: https://github.com/kloir/zmk-pmw3610-driver
    - name: caksoylar
      url-base: https://github.com/caksoylar/zmk-rgbled-widget
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: kloir-z
      revision: main
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
  self:
    path: config
